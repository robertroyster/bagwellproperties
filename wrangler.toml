name = "bagwellproperties"
main = "worker/index.ts"
compatibility_date = "2026-06-30"
compatibility_flags = ["nodejs_compat"]

account_id = "cd42ba0fcc5fcdd298c836c6b0fb038c"

# Live route — bp.tlbm.cc (tlbm.cc zone is already on Cloudflare).
routes = [
  { pattern = "bp.tlbm.cc", custom_domain = true },
]

# Built React SPA, served as static assets; unmatched routes fall through to the Worker.
[assets]
directory = "./dist/public"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "bagwell-site"
database_id = "a7cf06cc-1ec3-44ee-b1d8-8dccfaa629e6"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "bagwell-assets"
